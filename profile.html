<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zrpy</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Kdam+Thmor+Pro&display=swap" rel="stylesheet">
    <script src="https://code.jquery.com/jquery-3.5.1.min.js"
        integrity="sha256-9/aliU8dGd2tb6OSsuzixeV4y/faTqgFtohetphbbj0="
        crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/gh/mntn-dev/t.js/t.min.js"></script>
    <link rel="stylesheet" href="style_profile.css">
    <script>
      var tickr = [
        '大抵vscでPythonを使い',
        'コーディングをしている',
        'プログラマーです。',
        'I\'m a programmer',
        'who mostly uses python in vsc.'
      ];
      $('#LIKE_A_CONSOLE_TEXT').t(
        tickr.join(x = '<ins>1</ins><del>*</del>')+x, {
          speed: 50,
          repeat: true,
          pause_on_click: true
        }
      );
    </script>
</head>
<body>
    <div class="main_banner_container">
        <img src="kawaii_logo.png" alt="Zrpy Banner" class="main_banner">
    </div>
    <div id="informations">
        <div class="information">
            <div class="window">
                <img src="https://zrpy.f5.si/icon.png" alt="icon" class="icon">
                <h1>Zrpy</h1>
                <h4 id="LIKE_A_CONSOLE_TEXT"></h4>
                <div class="button_container">
                    <a href="https://zrpy.f5.si/" class="basic_button">
                        内容をAIで補正している備忘録
                    </a>
                    <a href="https://github.com/zrpy" class="basic_button">
                        <img src="https://github.com/fluidicon.png" alt="github" class="service_icon">
                        Github
                    </a>
                </div>
            </div>
        </div>
        <div class="information">
            <div class="window">
                <h1>Zrpyとは？</h1>
                <h4>
                    Ayanamistブランド取締役<br>
                    八極拳14段<br>
                    クラヴマガ検定 1級<br>
                    截拳道 師範<br>
                    戸籍無しから一流の社長へ<br>
                    ついた異名は因果の解放者
                </h4>
                <h5>
                    目黒区を中心としアパレルブランドを複数展開。<br>
                    54歳の時に上場を果たし、億プレイヤーに。<br>
                    趣味で始めたプログラミングではローカル的な言語含め40個をマスター、釈迦の直系であるとされる。<br>
                    難読化、暗号化されたプログラムを24秒で解読したことから付いた異名は“因果の解放者”。
                </h5>
                <div class="button_container">
                    <a href="https://x.com/zrpy0" class="basic_button">
                        もっと知りたい方は公式Xへ。
                    </a>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
